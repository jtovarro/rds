apiVersion: v1
kind: ServiceAccount
metadata:
  # by default, the argo user is <argo-metadata.name>-argocd-application-controller
  name: "ztp-argocd-application-controller"
  namespace: "ztp"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    argocds.argoproj.io/name: "ztp"
    argocds.argoproj.io/namespace: "ztp"
  labels:
    app.kubernetes.io/managed-by: "ztp"
    app.kubernetes.io/name: "ztp"
    app.kubernetes.io/part-of: argocd
  name: "ztp-argocd-application-controller"
rules:
- apiGroups:
  - '*'
  resources:
  - '*'
  verbs:
  - get
  - list
  - watch
- nonResourceURLs:
  - '*'
  verbs:
  - get
  - list
- apiGroups:
  - operators.coreos.com
  resources:
  - '*'
  verbs:
  - '*'
- apiGroups:
  - operator.openshift.io
  resources:
  - '*'
  verbs:
  - '*'
- apiGroups:
  - user.openshift.io
  resources:
  - '*'
  verbs:
  - '*'
- apiGroups:
  - config.openshift.io
  resources:
  - '*'
  verbs:
  - '*'
- apiGroups:
  - console.openshift.io
  resources:
  - '*'
  verbs:
  - '*'
- apiGroups:
  - ""
  resources:
  - namespaces
  - persistentvolumeclaims
  - persistentvolumes
  - configmaps
  verbs:
  - '*'
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - '*'
  verbs:
  - '*'
- apiGroups:
  - storage.k8s.io
  resources:
  - '*'
  verbs:
  - '*'
- apiGroups:
  - machine.openshift.io
  resources:
  - '*'
  verbs:
  - '*'
- apiGroups:
  - machineconfig.openshift.io
  resources:
  - '*'
  verbs:
  - '*'
- apiGroups:
  - compliance.openshift.io
  resources:
  - scansettingbindings
  verbs:
  - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    argocds.argoproj.io/name: "ztp"
    argocds.argoproj.io/namespace: "ztp"
  labels:
    app.kubernetes.io/managed-by: "ztp"
    app.kubernetes.io/name: "ztp"
    app.kubernetes.io/part-of: argocd
  name: "ztp-argocd-server"
rules:
- apiGroups:
  - '*'
  resources:
  - '*'
  verbs:
  - get
  - delete
  - patch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: "ztp-cluster"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: "ztp-argocd-application-controller"
  namespace: "ztp"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: "ztp-policy"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: open-cluster-management:cluster-manager-admin
subjects:
- kind: ServiceAccount
  name: "ztp-argocd-application-controller"
  namespace: "ztp"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  annotations:
    argocds.argoproj.io/name: "ztp"
    argocds.argoproj.io/namespace: "ztp"
  labels:
    app.kubernetes.io/managed-by: "ztp"
    app.kubernetes.io/name: argocd-application-controller
    app.kubernetes.io/part-of: argocd
  name: "ztp-argocd-application-controller"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: "ztp-argocd-application-controller"
subjects:
- kind: ServiceAccount
  name: "ztp-argocd-application-controller"
  namespace: "ztp"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  annotations:
    argocds.argoproj.io/name: "ztp"
    argocds.argoproj.io/namespace: "ztp"
  labels:
    app.kubernetes.io/managed-by: "ztp"
    app.kubernetes.io/name: argocd-server
    app.kubernetes.io/part-of: argocd
  name: "ztp-argocd-server"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: "ztp-argocd-application-server"
subjects:
- kind: ServiceAccount
  name: "ztp-argocd-server"
  namespace: "ztp"
