kind: ClusterRoleBinding
metadata:
  name: custom-cluster-admin
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
subjects:
- kind: User
  name: admin
  apiGroup: rbac.authorization.k8s.io
roleRef:
